seed: 7

# runtype: train
runtype: test

# hash_freeze: True
hash_freeze: False

path_to_outputs: /scratch_net/ken/mcrespo/proj_marina/logs_new/multivol_12_12_inf

model_checkpoint: /scratch_net/ken/mcrespo/proj_marina/logs/multivol/2024-11-13_12h31m52s/checkpoints/epoch_0999.pt

dataset:
  path_to_data: /itet-stor/mcrespo/bmicdatasets-originals/Originals/fastMRI/brain/multicoil_train/
  n_volumes: 5
  n_slices: 2
  with_mask: True  # NOTE: During training phase, set to False.
  acceleration: 4
  center_frac: 0.15

dataloader:
  batch_size: 120_000
  pin_memory: False

model:
  id: Siren
  params:
    coord_dim: 3
    vol_embedding_dim: 256
    coil_embedding_dim: 128
    hidden_dim: 512
    levels: 3
    n_features: 3
    n_min: 45
    size_hashtable: 12
    n_layers: 6

loss:
  id: MSEL2
  params:
    gamma: 0.0
    sigma: 0.1

optimizer:
  id: Adam
  params:
    lr: 5.e-6 # The dot is necessary, otherwise the parser will mistake this for a string (and not a float).

scheduler:
  id: StepLR
  params:
    gamma: 1.0
    step_size: 20_000

# Training Process
n_epochs: 1000
log_interval: 50
checkpoint_interval: 1000  # Keep in mind that each checkpoint takes ~241 MB of space.

meta_learning:
  reinit_step: 2000
  epsilon: 0.01

###################################################
# INFORMATION ONLY - NO EFFECT ON RUN
###################################################
