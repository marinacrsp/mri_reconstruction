# model_checkpoint: /scratch_net/ken/mcrespo/proj_marina/logs_new/multivol_12_26/2025-01-08_22h13m56s/checkpoints/epoch_0099.pt # Model trained on 50 volumes
# model_checkpoint: /scratch_net/ken/mcrespo/proj_marina/logs_new/multivol_01_10_train/2025-01-10_20h50m37s/checkpoints/epoch_0499.pt
# model_checkpoint: /scratch_net/ken/mcrespo/proj_marina/logs_new/multivol_01_10_train/2025-01-14_18h48m12s/checkpoints/epoch_0199.pt # 1024 dimension
model_checkpoint: /scratch_net/ken/mcrespo/proj_marina/logs_new/multivol_01_10_train/2025-01-14_18h49m51s/checkpoints/epoch_0199.pt # 512 dimension


dataset:
  path_to_data: /itet-stor/mcrespo/bmicdatasets-originals/Originals/fastMRI/brain/multicoil_train/
  n_volumes: 5
  n_slices: 2
  with_mask: False  # NOTE: During training phase, set to False.
  with_center: False
  acceleration: 4
  center_frac: 0.15

dataloader:
  batch_size: 240_000
  pin_memory: False

model:
  id: Siren
  params:
    coord_dim: 3
    vol_embedding_dim: 512
    coil_embedding_dim: 256
    hidden_dim: 512
    n_layers: 8
    L : 10

loss:
  id: MSEL2
  params:
    gamma: 0.0
    sigma: 0.1

optimizer:
  id: Adam
  params:
    lr: 5.e-6 # The dot is necessary, otherwise the parser will mistake this for a string (and not a float).

scheduler:
  id: StepLR
  params:
    gamma: 1.0
    step_size: 20_000

# Training Process
n_epochs: 1000
log_interval: 50
checkpoint_interval: 1000  # Keep in mind that each checkpoint takes ~241 MB of space.

meta_learning:
  reinit_step: 200
  epsilon: 0.01

###################################################
# INFORMATION ONLY - NO EFFECT ON RUN
